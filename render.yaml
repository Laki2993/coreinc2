services:
  - type: web
    name: core
    env: php
    buildCommand: "composer install --no-dev --optimize-autoloader"
    startCommand: "php artisan config:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=10000"
    envVars:
      - key: APP_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        sync: false